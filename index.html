<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PXM Digimedia | Creating Content That Matters</title>
    <meta name="description" content="PXM Digimedia is a high-end creative studio specializing in cinematic storytelling, video production, and digital experiences.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #FFFFFF;
            overflow: hidden;
            margin: 0;
        }

        /* Animated Film Grain Overlay */
        .noise {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/5/5c/Image_with_generated_noise.png");
            opacity: 0.04;
            pointer-events: none;
            z-index: 50;
            animation: grain 8s steps(10) infinite;
        }

        @keyframes grain {
            0%, 100% { transform:translate(0, 0) }
            10% { transform:translate(-5%, -10%) }
            30% { transform:translate(3%, -15%) }
            50% { transform:translate(12%, 9%) }
            70% { transform:translate(9%, 4%) }
            90% { transform:translate(-1%, 7%) }
        }

        /* Cinematic Spotlight Background */
        .spotlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.06) 0%, rgba(0,0,0,0) 50%);
            z-index: 1;
            pointer-events: none;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .logo-glow {
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.15));
        }

        .kerning-tight { letter-spacing: -0.05em; }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="spotlight" id="spotlight"></div>

    <main class="relative z-10 min-h-screen flex flex-col items-center justify-between py-12 px-6 text-center">
        
        <div id="logo-container" class="opacity-0">
            <img src="LOGO_URL_HERE" alt="PXM Digimedia Logo" class="h-16 md:h-20 logo-glow mx-auto mb-4">
        </div>

        <div class="max-w-4xl">
            <h1 id="headline" class="text-4xl md:text-7xl font-black kerning-tight mb-6 opacity-0 leading-tight">
                Busy Creating Content <br> <span class="text-neutral-500 italic">That Matters.</span>
            </h1>
            <p id="subtext" class="text-neutral-400 text-lg md:text-xl font-light opacity-0 mb-10 tracking-wide">
                PXM Digimedia is building a new digital experience.<br class="hidden md:block"> 
                Until then, feel free to connect with us.
            </p>

            <div id="actions" class="flex flex-col md:flex-row items-center justify-center gap-6 opacity-0">
                <a href="mailto:saameet@pxmdigimedia.in" class="glass-btn flex items-center gap-3 px-8 py-4 rounded-full group">
                    <i data-lucide="mail" class="w-5 h-5 text-neutral-300 group-hover:text-white"></i>
                    <span class="font-medium">saameet@pxmdigimedia.in</span>
                </a>
                <a href="tel:+918850045588" class="glass-btn flex items-center gap-3 px-8 py-4 rounded-full group">
                    <i data-lucide="phone" class="w-5 h-5 text-neutral-300 group-hover:text-white"></i>
                    <span class="font-medium">+91 88500 45588</span>
                </a>
            </div>
        </div>

        <footer id="footer" class="opacity-0">
            <p class="text-neutral-600 text-xs uppercase tracking-[0.3em]">
                &copy; 2026 PXM Digimedia. All Rights Reserved.
            </p>
        </footer>

    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Mouse Spotlight Tracking
        window.addEventListener('mousemove', e => {
            const spotlight = document.getElementById('spotlight');
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            spotlight.style.setProperty('--x', `${x}%`);
            spotlight.style.setProperty('--y', `${y}%`);
        });

        // Cinematic Animations
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline({ defaults: { ease: "expo.out" } });

            tl.to("#logo-container", { opacity: 1, duration: 2, y: 0 })
              .to("#headline", { opacity: 1, y: -20, duration: 1.5 }, "-=1.2")
              .to("#subtext", { opacity: 1, y: -10, duration: 1.5 }, "-=1")
              .to("#actions", { opacity: 1, y: -10, duration: 1.5 }, "-=1")
              .to("#footer", { opacity: 1, duration: 2 }, "-=1.5");

            // Subtle Floating Logo Loop
            gsap.to("#logo-container", {
                y: 10,
                duration: 4,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });
        });
    </script>
</body>
</html>
