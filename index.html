<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PXM Digimedia | Building the Future of Content</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-color: #030303;
            --accent-glow: rgba(50, 50, 255, 0.15);
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        /* 1. ANIMATED MESH BACKGROUND */
        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(20, 20, 30, 1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(40, 20, 50, 0.4) 0, transparent 50%), 
                radial-gradient(at 50% 50%, rgba(10, 10, 10, 1) 0, transparent 100%);
            z-index: -2;
        }

        .ambient-light {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(80px);
            z-index: -1;
            animation: breathe 10s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-45%, -55%) scale(1.2); opacity: 0.8; }
        }

        /* 2. FILM GRAIN */
        .grain {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_element_noise_static.png');
            opacity: 0.03;
            z-index: 100;
            pointer-events: none;
            animation: grain-jump 0.2s steps(2) infinite;
        }

        @keyframes grain-jump {
            0% { transform: translate(0,0); }
            50% { transform: translate(-1%, -1%); }
            100% { transform: translate(1%, 1%); }
        }

        /* 3. PREMIUM TYPOGRAPHY */
        .headline {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.04em;
            line-height: 0.95;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        canvas#particles {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
        }

        /* Text reveal mask */
        .reveal-box {
            overflow: hidden;
            display: inline-block;
            vertical-align: bottom;
        }
    </style>
</head>
<body>

    <div class="mesh-gradient"></div>
    <div class="ambient-light"></div>
    <div class="grain"></div>
    <canvas id="particles"></canvas>

    <main class="relative z-10 min-h-screen flex flex-col items-center justify-between py-16 px-6 text-center">
        
        <div id="logo-wrap" class="opacity-0 translate-y-10">
            <img src="YOUR_LOGO_FILE_NAME.png" alt="PXM Digimedia" class="h-12 md:h-16 brightness-110 contrast-125">
        </div>

        <div class="max-w-5xl">
            <h1 class="headline text-5xl md:text-8xl font-bold mb-8">
                <span class="reveal-box"><span class="rev-item inline-block">Busy Creating</span></span><br>
                <span class="reveal-box"><span class="rev-item inline-block text-neutral-500 italic font-light">Content That Matters.</span></span>
            </h1>
            
            <p id="subtext" class="text-neutral-400 text-lg md:text-xl max-w-2xl mx-auto font-light tracking-wide opacity-0">
                Crafting cinematic narratives and high-end digital experiences. <br> 
                Our new digital home is currently under construction.
            </p>
        </div>

        <div id="actions" class="flex flex-col md:flex-row items-center justify-center gap-6 opacity-0">
            <a href="mailto:saameet@pxmdigimedia.in" class="glass-card flex items-center gap-4 px-10 py-5 rounded-2xl group">
                <i data-lucide="mail" class="w-5 h-5 text-neutral-400 group-hover:text-white"></i>
                <div class="text-left">
                    <p class="text-[10px] uppercase tracking-[0.2em] text-neutral-500">Email Us</p>
                    <p class="text-sm font-medium">saameet@pxmdigimedia.in</p>
                </div>
            </a>

            <a href="tel:+918850045588" class="glass-card flex items-center gap-4 px-10 py-5 rounded-2xl group">
                <i data-lucide="phone" class="w-5 h-5 text-neutral-400 group-hover:text-white"></i>
                <div class="text-left">
                    <p class="text-[10px] uppercase tracking-[0.2em] text-neutral-500">Call Directly</p>
                    <p class="text-sm font-medium">+91 88500 45588</p>
                </div>
            </a>
        </div>

        <footer id="footer" class="opacity-0">
            <div class="h-[1px] w-12 bg-neutral-800 mx-auto mb-6"></div>
            <p class="text-neutral-600 text-[10px] uppercase tracking-[0.4em]">
                &copy; 2026 PXM Digimedia &bull; Mumbai
            </p>
        </footer>

    </main>

    <script>
        lucide.createIcons();

        // 1. STAGGERED REVEAL ANIMATION
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline({ defaults: { ease: "expo.out" } });

            tl.to("#logo-wrap", { opacity: 1, y: 0, duration: 2 })
              .from(".rev-item", { y: "100%", duration: 1.5, stagger: 0.2 }, "-=1.5")
              .to("#subtext", { opacity: 1, y: -10, duration: 2 }, "-=1")
              .to("#actions", { opacity: 1, y: -10, duration: 2 }, "-=1.5")
              .to("#footer", { opacity: 1, duration: 2 }, "-=1.5");
        });

        // 2. INTERACTIVE PARTICLES
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // 3. MOUSE TRACKING GLOW
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            gsap.to(".ambient-light", {
                left: `${x}%`,
                top: `${y}%`,
                duration: 2,
                ease: "power2.out"
            });
        });
    </script>
</body>
</html>
